services:

  # ── CORE ─────────────────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    profiles: [core]
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-frontier}
      POSTGRES_USER: ${POSTGRES_USER:-frontier}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./storage/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    # $$ — подстановка env внутри контейнера (см. Docker Compose / healthcheck)
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 25s
    restart: unless-stopped
    networks: [frontier-net]

  redis:
    image: redis:7-alpine
    profiles: [core]
    command: redis-server --save 60 1 --loglevel warning --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 15s
    restart: unless-stopped
    networks: [frontier-net]

  qdrant:
    image: qdrant/qdrant:latest
    profiles: [core]
    volumes:
      - qdrant_data:/qdrant/storage
    ports:
      - "6333:6333"
    # Образ qdrant без curl/wget; entrypoint на bash — проверка TCP :6333 (см. docs/ops-server-troubleshooting.md)
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -sf http://127.0.0.1:6333/readyz 2>/dev/null || wget -qO- http://127.0.0.1:6333/readyz >/dev/null 2>&1 || bash -c 'exec 3<>/dev/tcp/127.0.0.1/6333'",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 25s
    restart: unless-stopped
    networks: [frontier-net]

  neo4j:
    image: neo4j:5.15-community
    profiles: [core]
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_server_memory_heap_initial__size: 512m
      NEO4J_server_memory_heap_max__size: 2g
      NEO4J_server_memory_pagecache_size: 512m
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    ports:
      - "7474:7474"
      - "7687:7687"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -q --spider http://127.0.0.1:7474/ 2>/dev/null || curl -sf http://127.0.0.1:7474/ 2>/dev/null || bash -c 'exec 3<>/dev/tcp/127.0.0.1/7474'",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 45s
    restart: unless-stopped
    networks: [frontier-net]

  gpt2giga-proxy:
    build:
      context: ./gpt2giga-proxy
      dockerfile: Dockerfile
    profiles: [core]
    dns:
      - 8.8.8.8
      - 1.1.1.1
      - 127.0.0.11
    environment:
      GIGACHAT_CREDENTIALS: ${GIGACHAT_CREDENTIALS}
      GIGACHAT_SCOPE: ${GIGACHAT_SCOPE:-GIGACHAT_API_PERS}
      GIGACHAT_BASE_URL: ${GIGACHAT_BASE_URL:-https://gigachat.devices.sberbank.ru/api/v1}
      GIGACHAT_MODEL: ${GIGACHAT_MODEL:-}
      GIGACHAT_MAX_RETRIES: ${GIGACHAT_MAX_RETRIES:-3}
      GIGACHAT_RETRY_BACKOFF_FACTOR: ${GIGACHAT_RETRY_BACKOFF_FACTOR:-0.5}
      GIGACHAT_VERIFY_SSL_CERTS: ${GIGACHAT_VERIFY_SSL_CERTS:-False}
      GPT2GIGA_HOST: 0.0.0.0
      GPT2GIGA_PROXY_PORT: 8090
      GPT2GIGA_LOG_LEVEL: ${GPT2GIGA_LOG_LEVEL:-INFO}
      GPT2GIGA_TIMEOUT: 600
      GPT2GIGA_EMBEDDINGS: ${GIGACHAT_EMBEDDINGS_MODEL:-EmbeddingsGigaR}
      GPT2GIGA_PASS_MODEL: ${GPT2GIGA_PASS_MODEL:-True}
      GPT2GIGA_ENABLE_IMAGES: ${GPT2GIGA_ENABLE_IMAGES:-True}
      GPT2GIGA_VERBOSE: "False"
    ports:
      - "8090:8090"
    # Liveness: порт слушает (не зависит от ответа GigaChat на /v1/models)
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import socket;s=socket.socket();s.settimeout(3);s.connect(('127.0.0.1',8090));s.close()\"",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s
    restart: unless-stopped
    networks: [frontier-net]

  # ── INGEST ───────────────────────────────────────────────────────────────────

  ingest:
    build:
      context: .
      dockerfile: ingest/Dockerfile
    profiles: [ingest]
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-frontier}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-frontier}
      REDIS_URL: redis://redis:6379
      GIGACHAT_PROXY_URL: http://gpt2giga-proxy:8090
      S3_ENDPOINT_URL: ${S3_ENDPOINT_URL}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME}
      S3_REGION: ${S3_REGION:-ru-central-1}
      TG_API_ID_0: ${TG_API_ID_0}
      TG_API_HASH_0: ${TG_API_HASH_0}
      TG_API_ID_1: ${TG_API_ID_1:-}
      TG_API_HASH_1: ${TG_API_HASH_1:-}
      # Telethon: SOCKS5 / MTProxy для Telegram DC (gpt2giga-proxy:8090 — только API модели, сюда не подставлять)
      TG_SOCKS5: ${TG_SOCKS5:-}
      TG_PROXY_DSN: ${TG_PROXY_DSN:-}
      TG_PROXY_HOST: ${TG_PROXY_HOST:-}
      TG_PROXY_PORT: ${TG_PROXY_PORT:-1080}
      TG_PROXY_USER: ${TG_PROXY_USER:-}
      TG_PROXY_PASS: ${TG_PROXY_PASS:-}
      WG_SOCKS_HOST: ${WG_SOCKS_HOST:-}
      WG_SOCKS_PORT: ${WG_SOCKS_PORT:-1080}
      WG_SOCKS_USER: ${WG_SOCKS_USER:-}
      WG_SOCKS_PASS: ${WG_SOCKS_PASS:-}
      MTPROXY_HOST: ${MTPROXY_HOST:-}
      MTPROXY_PORT: ${MTPROXY_PORT:-443}
      MTPROXY_SECRET: ${MTPROXY_SECRET:-}
      # 1/true/on — выход при старте, если в env нет прокси для Telethon (per-source в БД не считается)
      TG_REQUIRE_PROXY: ${TG_REQUIRE_PROXY:-}
      HOSTNAME: ingest-0
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    volumes:
      - ./sessions:/app/sessions
    depends_on:
      postgres:
        condition: service_started
      redis:
        condition: service_started
      xray:
        condition: service_started
    restart: unless-stopped
    networks: [frontier-net]

  xray:
    build:
      context: .
      dockerfile: services/xray/Dockerfile
    profiles: [xray]
    environment:
      XRAY_VLESS_ADDRESS: ${XRAY_VLESS_ADDRESS:-}
      XRAY_VLESS_PORT: ${XRAY_VLESS_PORT:-443}
      XRAY_VLESS_ID: ${XRAY_VLESS_ID:-}
      XRAY_VLESS_FLOW: ${XRAY_VLESS_FLOW:-xtls-rprx-vision}
      XRAY_REALITY_SNI: ${XRAY_REALITY_SNI:-}
      XRAY_REALITY_FP: ${XRAY_REALITY_FP:-chrome}
      XRAY_REALITY_PBK: ${XRAY_REALITY_PBK:-}
      XRAY_REALITY_SID: ${XRAY_REALITY_SID:-}
      XRAY_SOCKS_PORT: ${XRAY_SOCKS_PORT:-10808}
      XRAY_LOG_LEVEL: ${XRAY_LOG_LEVEL:-warning}
    volumes:
      - ./services/xray/run-xray.sh:/etc/xray/run-xray.sh:ro
    restart: unless-stopped
    networks: [frontier-net]

  # ── WORKER ───────────────────────────────────────────────────────────────────

  worker:
    build:
      context: .
      dockerfile: worker/Dockerfile
    profiles: [worker]
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-frontier}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-frontier}
      REDIS_URL: redis://redis:6379
      QDRANT_URL: http://qdrant:6333
      NEO4J_URL: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
      OPENAI_API_BASE: http://gpt2giga-proxy:8090/v1
      GIGACHAT_PROXY_URL: http://gpt2giga-proxy:8090
      GIGACHAT_EMBEDDINGS_MODEL: ${GIGACHAT_EMBEDDINGS_MODEL:-EmbeddingsGigaR}
      GIGACHAT_MODEL_LITE: ${GIGACHAT_MODEL_LITE:-GigaChat-2}
      GIGACHAT_MODEL: ${GIGACHAT_MODEL:-GigaChat-2}
      GIGACHAT_MODEL_PRO: ${GIGACHAT_MODEL_PRO:-GigaChat-2-Pro}
      GIGACHAT_MODEL_MAX: ${GIGACHAT_MODEL_MAX:-GigaChat-2-Max}
      GIGACHAT_MODEL_RELEVANCE: ${GIGACHAT_MODEL_RELEVANCE:-}
      GIGACHAT_MODEL_CONCEPTS: ${GIGACHAT_MODEL_CONCEPTS:-}
      GIGACHAT_MODEL_MCP_SYNTHESIS: ${GIGACHAT_MODEL_MCP_SYNTHESIS:-}
      GIGACHAT_VISION_MODEL: ${GIGACHAT_VISION_MODEL:-}
      GIGACHAT_SESSION_CACHE_ENABLED: ${GIGACHAT_SESSION_CACHE_ENABLED:-true}
      GIGACHAT_ESCALATION_ENABLED: ${GIGACHAT_ESCALATION_ENABLED:-true}
      GIGACHAT_TOKEN_BUDGET_RELEVANCE: ${GIGACHAT_TOKEN_BUDGET_RELEVANCE:-1500}
      GIGACHAT_TOKEN_BUDGET_CONCEPTS: ${GIGACHAT_TOKEN_BUDGET_CONCEPTS:-1500}
      GIGACHAT_TOKEN_BUDGET_RELEVANCE_CONCEPTS: ${GIGACHAT_TOKEN_BUDGET_RELEVANCE_CONCEPTS:-1800}
      GIGACHAT_TOKEN_BUDGET_EMBED: ${GIGACHAT_TOKEN_BUDGET_EMBED:-1200}
      GIGACHAT_TOKEN_BUDGET_VISION_PROMPT: ${GIGACHAT_TOKEN_BUDGET_VISION_PROMPT:-600}
      GIGACHAT_RELEVANCE_GRAY_ZONE: ${GIGACHAT_RELEVANCE_GRAY_ZONE:-0.1}
      GIGACHAT_RC_JOINT_ENABLED: ${GIGACHAT_RC_JOINT_ENABLED:-false}
      GIGACHAT_RC_JOINT_WORKSPACES: ${GIGACHAT_RC_JOINT_WORKSPACES:-}
      GIGACHAT_RC_JOINT_SOURCES: ${GIGACHAT_RC_JOINT_SOURCES:-}
      GIGACHAT_MAX_SIMULTANEOUS_REQUESTS: ${GIGACHAT_MAX_SIMULTANEOUS_REQUESTS:-1}
      GIGACHAT_MIN_REQUEST_INTERVAL_MS: ${GIGACHAT_MIN_REQUEST_INTERVAL_MS:-250}
      INDEXING_MAX_CONCURRENCY: ${INDEXING_MAX_CONCURRENCY:-1}
      VISION_ENABLED: ${VISION_ENABLED:-true}
      VISION_CLAIM_IDLE_MS: ${VISION_CLAIM_IDLE_MS:-600000}
      VISION_MAX_DELIVERY_COUNT: ${VISION_MAX_DELIVERY_COUNT:-5}
      VISION_DLQ_STREAM: ${VISION_DLQ_STREAM:-stream:posts:vision:dlq}
      EMBED_DIM: ${EMBED_DIM:-2560}
      S3_ENDPOINT_URL: ${S3_ENDPOINT_URL}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME}
      S3_REGION: ${S3_REGION:-ru-central-1}
      SEARXNG_URL: http://searxng:8080
      PADDLEOCR_URL: ${PADDLEOCR_URL:-}
      XDG_CACHE_HOME: /cache
      HF_HOME: /cache/huggingface
      HF_HUB_CACHE: /cache/huggingface/hub
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    deploy:
      resources:
        limits:
          memory: 2g
    depends_on:
      postgres:
        condition: service_started
      redis:
        condition: service_started
      qdrant:
        condition: service_started
      gpt2giga-proxy:
        condition: service_started
      searxng:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - fastembed_cache:/cache
    networks: [frontier-net]

  # ── PaddleOCR (опционально, как в telegram-assistant) ───────────────────────
  paddleocr:
    build:
      context: .
      dockerfile: services/paddleocr/Dockerfile
      args:
        PIP_INDEX_URL: ${PIP_INDEX_URL:-}
    profiles: [paddleocr]
    environment:
      # По умолчанию false: сервис поднимается без скачивания с BCE (DNS/сеть). true — в .env при доступе к paddleocr.bj.bcebos.com
      LOCAL_OCR_PRELOAD: "${LOCAL_OCR_PRELOAD:-false}"
      LOCAL_OCR_DET_MODEL_DIR: "${LOCAL_OCR_DET_MODEL_DIR:-}"
      LOCAL_OCR_REC_MODEL_DIR: "${LOCAL_OCR_REC_MODEL_DIR:-}"
      LOCAL_OCR_CLS_MODEL_DIR: "${LOCAL_OCR_CLS_MODEL_DIR:-}"
    dns:
      - 8.8.8.8
      - 8.8.4.4
    volumes:
      # Кэш весов PP-OCR (как устойчивость к пересозданию; в telegram-assistant в dev — mount всего репо)
      - paddleocr_models:/root/.paddleocr
    ports:
      - "${PADDLEOCR_PORT:-8008}:8008"
    deploy:
      resources:
        limits:
          memory: 4g
    # Readiness только после загрузки весов (см. GET /readyz)
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -sf http://127.0.0.1:8008/readyz >/dev/null || wget -qO- http://127.0.0.1:8008/readyz >/dev/null 2>&1 || python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8008/readyz', timeout=5)\"",
        ]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 600s
    restart: unless-stopped
    networks: [frontier-net]

  # ── MCP ──────────────────────────────────────────────────────────────────────

  mcp:
    build:
      context: .
      dockerfile: mcp/Dockerfile
    profiles: [mcp]
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-frontier}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-frontier}
      REDIS_URL: redis://redis:6379
      QDRANT_URL: http://qdrant:6333
      NEO4J_URL: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
      OPENAI_API_BASE: http://gpt2giga-proxy:8090/v1
      GIGACHAT_PROXY_URL: http://gpt2giga-proxy:8090
      GIGACHAT_EMBEDDINGS_MODEL: ${GIGACHAT_EMBEDDINGS_MODEL:-EmbeddingsGigaR}
      GIGACHAT_MODEL_LITE: ${GIGACHAT_MODEL_LITE:-GigaChat-2}
      GIGACHAT_MODEL: ${GIGACHAT_MODEL:-GigaChat-2}
      GIGACHAT_MODEL_PRO: ${GIGACHAT_MODEL_PRO:-GigaChat-2-Pro}
      GIGACHAT_MODEL_MAX: ${GIGACHAT_MODEL_MAX:-GigaChat-2-Max}
      GIGACHAT_MODEL_MCP_SYNTHESIS: ${GIGACHAT_MODEL_MCP_SYNTHESIS:-}
      GIGACHAT_SESSION_CACHE_ENABLED: ${GIGACHAT_SESSION_CACHE_ENABLED:-true}
      GIGACHAT_ESCALATION_ENABLED: ${GIGACHAT_ESCALATION_ENABLED:-true}
      GIGACHAT_TOKEN_BUDGET_EMBED: ${GIGACHAT_TOKEN_BUDGET_EMBED:-1200}
      EMBED_DIM: ${EMBED_DIM:-2560}
      MCP_PORT: 8100
      XDG_CACHE_HOME: /cache
      HF_HOME: /cache/huggingface
      HF_HUB_CACHE: /cache/huggingface/hub
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    ports:
      - "8100:8100"
    depends_on:
      postgres:
        condition: service_started
      qdrant:
        condition: service_started
      gpt2giga-proxy:
        condition: service_started
    restart: unless-stopped
    volumes:
      - fastembed_cache:/cache
    networks: [frontier-net]

  # ── MCP GATEWAY (SSE транспорт для Claude Code / Cursor) ────────────────────

  mcp-gateway:
    build:
      context: .
      dockerfile: mcp/Dockerfile.gateway
    profiles: [mcp]
    environment:
      MCP_GATEWAY_HOST: "0.0.0.0"
      MCP_GATEWAY_PORT: "8102"
      MCP_REST_BASE: "http://mcp:8100"
    ports:
      - "8102:8102"
    depends_on:
      - mcp
    restart: unless-stopped
    networks: [frontier-net]

  # ── ADMIN ────────────────────────────────────────────────────────────────────

  admin:
    build:
      context: .
      dockerfile: admin/Dockerfile
    profiles: [admin]
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-frontier}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-frontier}
      REDIS_URL: redis://redis:6379
      QDRANT_URL: http://qdrant:6333
      NEO4J_URL: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
      S3_ENDPOINT_URL: ${S3_ENDPOINT_URL}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME}
      S3_REGION: ${S3_REGION:-ru-central-1}
      GIGACHAT_CREDENTIALS: ${GIGACHAT_CREDENTIALS}
      GIGACHAT_SCOPE: ${GIGACHAT_SCOPE:-GIGACHAT_API_PERS}
      GIGACHAT_BASE_URL: ${GIGACHAT_BASE_URL:-https://gigachat.devices.sberbank.ru/api/v1}
      GIGACHAT_AUTH_URL: ${GIGACHAT_AUTH_URL:-https://ngw.devices.sberbank.ru:9443/api/v2/oauth}
      GIGACHAT_VERIFY_SSL_CERTS: ${GIGACHAT_VERIFY_SSL_CERTS:-False}
      TG_API_ID_0: ${TG_API_ID_0}
      TG_API_HASH_0: ${TG_API_HASH_0}
      TG_API_ID_1: ${TG_API_ID_1:-}
      TG_API_HASH_1: ${TG_API_HASH_1:-}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      ALERT_TELEGRAM_CHAT_ID: ${ALERT_TELEGRAM_CHAT_ID:-}
      TELEGRAM_ALERT_CHAT_ID: ${TELEGRAM_ALERT_CHAT_ID:-}
      TELEGRAM_ALERT_PROXY_URL: ${TELEGRAM_ALERT_PROXY_URL:-socks5://xray:10808}
      ALERTMANAGER_WEBHOOK_TOKEN: ${ALERTMANAGER_WEBHOOK_TOKEN:-}
      PROMETHEUS_URL: ${PROMETHEUS_URL:-http://prometheus:9090}
      REDIS_STREAM_LAG_ALERT_THRESHOLD: ${REDIS_STREAM_LAG_ALERT_THRESHOLD:-1000}
      REDIS_STREAM_PENDING_ALERT_THRESHOLD: ${REDIS_STREAM_PENDING_ALERT_THRESHOLD:-100}
      REDIS_STREAM_OLDEST_PENDING_AGE_ALERT_SECONDS: ${REDIS_STREAM_OLDEST_PENDING_AGE_ALERT_SECONDS:-900}
      ADMIN_TREND_ALERT_CRON: ${ADMIN_TREND_ALERT_CRON:-25 * * * *}
      TREND_ALERTS_ENABLED: ${TREND_ALERTS_ENABLED:-true}
      TREND_ALERT_WINDOW_HOURS: ${TREND_ALERT_WINDOW_HOURS:-48}
      TREND_ALERT_MIN_SIGNAL_SCORE: ${TREND_ALERT_MIN_SIGNAL_SCORE:-0.80}
      TREND_ALERT_CHANGE_POINT_MIN_SIGNAL_SCORE: ${TREND_ALERT_CHANGE_POINT_MIN_SIGNAL_SCORE:-0.74}
      TREND_ALERT_MIN_CHANGE_POINT_STRENGTH: ${TREND_ALERT_MIN_CHANGE_POINT_STRENGTH:-0.70}
      TREND_ALERT_MIN_DOC_COUNT: ${TREND_ALERT_MIN_DOC_COUNT:-5}
      TREND_ALERT_MIN_SOURCE_COUNT: ${TREND_ALERT_MIN_SOURCE_COUNT:-3}
      TREND_ALERT_MAX_PER_RUN: ${TREND_ALERT_MAX_PER_RUN:-2}
      TREND_ALERT_MAX_PER_7D: ${TREND_ALERT_MAX_PER_7D:-2}
      ADMIN_PORT: 8101
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    ports:
      - "8101:8101"
    depends_on:
      postgres:
        condition: service_started
      redis:
        condition: service_started
      xray:
        condition: service_started
    restart: unless-stopped
    networks: [frontier-net]

  # ── CRAWL ────────────────────────────────────────────────────────────────────

  crawl4ai:
    build:
      context: .
      dockerfile: crawl4ai/Dockerfile
    profiles: [crawl]
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-frontier}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-frontier}
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT_URL: ${S3_ENDPOINT_URL}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME}
      S3_REGION: ${S3_REGION:-ru-central-1}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    deploy:
      resources:
        limits:
          memory: 1g
    depends_on:
      redis:
        condition: service_started
      postgres:
        condition: service_started
      xray:
        condition: service_started
    restart: unless-stopped
    networks: [frontier-net]

  # ── SEARXNG ──────────────────────────────────────────────────────────────────

  searxng:
    image: searxng/searxng:latest
    profiles: [searxng, worker]
    environment:
      SEARXNG_BASE_URL: http://searxng:8080/
    volumes:
      - ./searxng:/etc/searxng:rw
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -q --spider http://127.0.0.1:8080/healthz 2>/dev/null || curl -sf http://127.0.0.1:8080/healthz >/dev/null 2>&1 || python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/healthz', timeout=5)\"",
        ]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 25s
    restart: unless-stopped
    networks: [frontier-net]

  # ── MONITOR ──────────────────────────────────────────────────────────────────

  prometheus:
    image: prom/prometheus:latest
    profiles: [monitor]
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=200h
      - --web.enable-lifecycle
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    restart: unless-stopped
    networks: [frontier-net]

  alertmanager:
    image: prom/alertmanager:latest
    profiles: [monitor]
    entrypoint:
      - /bin/sh
      - -lc
      - |
        sed "s#__ALERTMANAGER_WEBHOOK_TOKEN__#$${ALERTMANAGER_WEBHOOK_TOKEN}#g" \
          /etc/alertmanager/alertmanager.yml > /tmp/alertmanager.yml
        exec /bin/alertmanager \
          --config.file=/tmp/alertmanager.yml \
          --storage.path=/alertmanager
    environment:
      ALERTMANAGER_WEBHOOK_TOKEN: ${ALERTMANAGER_WEBHOOK_TOKEN:-}
    command:
    volumes:
      - ./prometheus/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    ports:
      - "9093:9093"
    depends_on:
      - admin
    restart: unless-stopped
    networks: [frontier-net]

  node-exporter:
    image: prom/node-exporter:v1.8.2
    profiles: [monitor]
    command:
      - --path.rootfs=/host
      - --path.procfs=/host/proc
      - --path.sysfs=/host/sys
      - --collector.filesystem.mount-points-exclude=^/(dev|proc|sys|run|var/lib/docker/.+|var/lib/containerd/.+)($|/)
    volumes:
      - /:/host:ro,rslave
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
    restart: unless-stopped
    networks: [frontier-net]

  grafana:
    image: grafana/grafana:latest
    profiles: [monitor]
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_PATHS_PROVISIONING: /etc/grafana/provisioning
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana:/etc/grafana/provisioning:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    restart: unless-stopped
    networks: [frontier-net]

volumes:
  postgres_data:
  redis_data:
  paddleocr_models:
  fastembed_cache:
  qdrant_data:
  neo4j_data:
  neo4j_logs:
  prometheus_data:
  alertmanager_data:
  grafana_data:

networks:
  frontier-net:
    driver: bridge
